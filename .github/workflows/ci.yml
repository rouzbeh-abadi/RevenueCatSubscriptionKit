name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  test:
    name: Test (macOS)
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app

      - name: Run tests
        run: swift test

  build:
    name: Build (${{ matrix.platform.name }})
    runs-on: macos-15

    strategy:
      fail-fast: false
      matrix:
        platform:
          - { name: iOS,      destination: 'generic/platform=iOS' }
          - { name: tvOS,     destination: 'generic/platform=tvOS' }
          - { name: watchOS,  destination: 'generic/platform=watchOS' }
          - { name: visionOS, destination: 'generic/platform=visionOS' }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app

      - name: Build
        run: |
          set -o pipefail
          xcodebuild build \
            -scheme RevenueCatSubscriptionKit \
            -destination '${{ matrix.platform.destination }}' \
            | xcpretty
